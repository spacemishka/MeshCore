name: Build ThinkNode M1 Companion Firmwares

permissions:
  contents: write

on:
  release:
    types: [created, published]
  workflow_dispatch:
  push:
    tags:
      - 'thinknode-m1-companion-*'

jobs:

  build:
    runs-on: ubuntu-latest
    steps:

      - name: Clone Repo
        uses: actions/checkout@v4

      - name: Setup Build Environment
        uses: ./.github/actions/setup-build-environment

      - name: Build Firmwares
        env:
          FIRMWARE_VERSION: ${{ env.GIT_TAG_VERSION }}
        run: /usr/bin/env bash build.sh build-matching-firmwares ThinkNode_M1_companion

      - name: Upload Workflow Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: thinknode-m1-companion-firmwares
          path: out

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          name: ThinkNode M1 Companion Firmware ${{ env.GIT_TAG_VERSION }}
          body: ""
          draft: true
          files: out/*
